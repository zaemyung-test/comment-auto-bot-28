name: Issue Commenter

on:
  issues:
    types: [opened, labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ownerName = 'zaemyung-test';
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map(l => l.name.toLowerCase());
            let message = null;
            if (labels.includes('bug')) {
              message = `Thank you. We will fix it. Best regards, ${ownerName}.`;
            } else if (labels.includes('feature')) {
              message = `Thank you, we will consider to include this feature. Best regards, ${ownerName}.`;
            } else if (labels.includes('discussion')) {
              message = `Happy to discuss this topic with you. Best regards, ${ownerName}.`;
            }
            if (message) {
              await github.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message
              });
            }
